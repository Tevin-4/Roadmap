<div class="contacts">
    <h2>Get Into Contact</h2>
<form>
    <div class="fname">
        <h4> First Name</h4>
        <input type="text" placeholder="First Name">
    </div>
    <div class="lname">
        <h4> Last Name</h4>
        <input type="text" placeholder="Last Name" >
    </div>
    <div class="email">
        <h4> Email</h4>
        <input type="text" placeholder="Email">
    </div>
    <div class="message">
        <h4> Message</h4>
        <textarea placeholder="Message" cols="30" rows="5"></textarea>
    </div>
    <div class="submit">
        <button type="submit">Submit</button>
    </div>
</form>
</div>
